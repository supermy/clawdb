name: Performance Benchmark

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      vector_count:
        description: 'Number of vectors for testing'
        required: false
        default: '50000'
      run_full_benchmark:
        description: 'Run full SIFT1M benchmark'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-bench-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install RocksDB dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librocksdb-dev

      - name: Build release
        run: cargo build --release

      - name: Generate test data
        run: |
          mkdir -p data
          cargo run --release --bin generate_test_data ${{ github.event.inputs.vector_count || '50000' }}

      - name: Run quick benchmark
        run: |
          cargo run --release --bin quick_benchmark 2>&1 | tee benchmark_results.txt

      - name: Run comprehensive benchmark
        run: |
          cargo run --release --bin comprehensive_benchmark 2>&1 | tee comprehensive_results.txt

      - name: Extract benchmark results
        id: extract
        run: |
          echo "## Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Vector Count: ${{ github.event.inputs.vector_count || '50000' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Benchmark" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Comprehensive Benchmark" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat comprehensive_results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: |
            benchmark_results.txt
            comprehensive_results.txt
            data/benchmark_report.md
          retention-days: 30

  criterion:
    name: Criterion Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.run_full_benchmark == 'true'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-criterion-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install RocksDB dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librocksdb-dev

      - name: Run Criterion benchmarks
        run: cargo bench -- --output-format bencher | tee criterion_results.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: criterion_results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@moyong'

      - name: Upload Criterion results
        uses: actions/upload-artifact@v3
        with:
          name: criterion-results
          path: target/criterion/
          retention-days: 30

  memory-profile:
    name: Memory Profiling
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install valgrind
        run: sudo apt-get install -y valgrind

      - name: Build with debug info
        run: cargo build --release

      - name: Generate test data
        run: |
          mkdir -p data
          cargo run --release --bin generate_test_data 10000

      - name: Run memory profile
        run: |
          valgrind --tool=massif --massif-out-file=massif.out ./target/release/quick_benchmark
          ms_print massif.out > memory_profile.txt

      - name: Upload memory profile
        uses: actions/upload-artifact@v3
        with:
          name: memory-profile
          path: memory_profile.txt
          retention-days: 30
